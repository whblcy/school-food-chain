server {
    listen       80;
    server_name  _;

    # ------- 静态资源：Vue3 SPA（Vite 构建产物位于 /usr/share/nginx/html） -------
    root   /usr/share/nginx/html;
    index  index.html;

    # ------- 后端 API 反向代理 -------
    # /api 及 /docs /openapi.json /redoc 转发到 backend:8000
    location ~ ^/(api|docs|openapi\.json|redoc)(/.*)?$ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ------- 静态资源强缓存（Vite 产物带 hash） -------
    location ~* \.(?:js|css|woff2?|ttf|eot|ico|png|jpe?g|gif|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # ------- SPA fallback：任何其它路径返回 index.html -------
    # 注意: 这里不会覆盖上面的 /api 正则匹配（nginx 正则优先级高于 prefix）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ------- 基本安全头 -------
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ------- 错误页 -------
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
